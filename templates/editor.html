<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>clickscribe · 操作文档编辑器</title>
<style>
  :root{
    --blue:#4f8cff; --blue-d:#3a6fd8; --bg:#f4f6fb; --card:#fff;
    --border:#e3e8ef; --text:#1f2733; --muted:#6b7785; --red:#f53f3f;
    --orange:#ff9200; --orange-d:#cc6a00;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
       background:var(--bg);color:var(--text);}
  header{background:linear-gradient(135deg,#4f8cff,#6f6cff);color:#fff;
         padding:14px 24px;box-shadow:0 2px 10px rgba(0,0,0,.08);position:sticky;top:0;z-index:10;}
  header .row1{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header h1{margin:0;font-size:19px;font-weight:700;letter-spacing:.5px}
  header .logo{font-size:20px}
  header input.title{flex:1;min-width:180px;background:rgba(255,255,255,.18);
         border:1px solid rgba(255,255,255,.3);color:#fff;font-size:14px;
         padding:7px 12px;border-radius:8px;outline:none}
  header input.title::placeholder{color:rgba(255,255,255,.7)}
  .toolbar{display:flex;gap:6px;align-items:center;margin-top:10px;flex-wrap:wrap}
  button{cursor:pointer;border:none;border-radius:8px;padding:7px 12px;font-size:13px;
         font-family:inherit;background:#fff;color:var(--blue-d);font-weight:600;
         transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.06)}
  button:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.12)}
  button:disabled{opacity:.5;cursor:not-allowed}
  button.record{background:var(--red);color:#fff}
  button.record.recording{background:#fff;color:var(--red);animation:pulse 1.2s infinite}
  button.ghost{background:rgba(255,255,255,.16);color:#fff;box-shadow:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  select{padding:7px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;background:#fff}
  .spacer{flex:1}
  #progress{display:none;margin-top:10px;align-items:center;gap:10px}
  #progress.show{display:flex}
  .progbar{flex:1;height:9px;background:rgba(255,255,255,.25);border-radius:5px;overflow:hidden}
  #progFill{height:100%;width:0;background:#fff;transition:width .25s}
  #progText{font-size:13px;white-space:nowrap}
  .warn{background:#fff3cd;color:#856404;padding:10px 24px;font-size:14px;border-bottom:1px solid #ffe69c}
  main{max-width:980px;margin:18px auto;padding:0 18px}
  .empty{text-align:center;color:var(--muted);padding:70px 20px;font-size:15px}
  .empty .big{font-size:46px;margin-bottom:10px}
  /* 紧凑步骤卡片 */
  .step{background:var(--card);border:1px solid var(--border);border-radius:12px;
        margin-bottom:12px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:.15s}
  .step.sel{border-color:var(--blue);box-shadow:0 0 0 2px rgba(79,140,255,.25)}
  .step-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .num{background:var(--blue);color:#fff;width:24px;height:24px;border-radius:50%;
       display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
  .step-head input.stitle{flex:1;font-size:14px;font-weight:600;border:none;
       border-bottom:1px dashed transparent;padding:3px 6px;background:transparent;outline:none}
  .step-head input.stitle:focus{border-bottom-color:var(--blue)}
  .icon-btn{background:none;box-shadow:none;color:var(--muted);padding:3px 7px;font-size:15px}
  .icon-btn:hover:not(:disabled){color:var(--red);transform:none;box-shadow:none}
  .step img{max-height:230px;max-width:100%;border-radius:8px;border:1px solid var(--border);
       display:block;margin-bottom:8px;cursor:zoom-in;object-fit:contain}
  .step textarea{width:100%;border:1px solid var(--border);border-radius:8px;
       padding:8px;font-size:13px;font-family:inherit;resize:vertical;outline:none;line-height:1.5}
  .step textarea:focus{border-color:var(--blue)}
  .badge{font-size:11px;background:#eef2ff;color:var(--blue-d);padding:2px 8px;border-radius:10px}
  input.selcb{width:17px;height:17px;cursor:pointer;accent-color:var(--blue)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
       background:#1f2733;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;
       box-shadow:0 4px 14px rgba(0,0,0,.2);opacity:0;transition:.3s;pointer-events:none;z-index:99}
  .toast.show{opacity:1}
  /* 设置模态 */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;
         justify-content:center;z-index:100}
  .modal-card{background:#fff;border-radius:14px;padding:24px;width:min(460px,92vw);
              max-height:88vh;overflow:auto;box-shadow:0 12px 40px rgba(0,0,0,.25)}
  .modal-card h3{margin-top:0;color:var(--blue-d)}
  .modal-card label{display:block;font-size:13px;font-weight:600;margin:12px 0 4px;color:var(--text)}
  .modal-card label small{font-weight:400;color:var(--muted)}
  .modal-card select,.modal-card input{width:100%;padding:8px 10px;border:1px solid var(--border);
              border-radius:8px;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box}
  .modal-card input:focus,.modal-card select:focus{border-color:var(--blue)}
  .modal-card .hint{color:var(--muted);font-size:12px}
  .modal-actions{display:flex;gap:8px;margin-top:18px}
  .modal-actions button{flex:1}
  .modal-note{font-size:12px;color:var(--muted);margin-top:14px;line-height:1.5}
  .cfg-block{margin-top:6px}
</style>
</head>
<body>
<header>
  <div class="row1">
    <span class="logo">📸</span>
    <h1>clickscribe</h1>
    <input class="title" id="title" placeholder="未命名指南…">
  </div>
  <div class="toolbar">
    <select id="sessions"></select>
    <button class="record" id="btnRecord">⏺ 开始录制</button>
    <button id="btnAi">✨ AI 生成说明</button>
    <button id="btnView">🎯 切聚焦</button>
    <button id="btnSettings" class="ghost">⚙️ AI 设置</button>
    <span class="spacer"></span>
    <label class="badge"><input type="checkbox" id="selAll" class="selcb"> 全选</label>
    <button id="btnDelSel" class="ghost">🗑 删选中</button>
    <button id="btnClearAI" class="ghost">🧹 清空说明</button>
    <span class="badge" id="countBadge">0 步</span>
    <button id="btnMd">⬇ MD</button>
    <button id="btnHtml">⬇ HTML</button>
    <button id="btnJson">⬇ JSON</button>
    <button id="btnShutdown" class="ghost">⏻ 关闭服务</button>
    <button class="record" id="btnDel">🗑 删会话</button>
  </div>
  <div id="progress"><div class="progbar"><div id="progFill"></div></div><span id="progText"></span></div>
</header>

<div class="warn" id="warn" style="display:none"></div>

<main>
  <div class="empty" id="empty">
    <div class="big">🎬</div>
    点击「开始录制」，然后去操作你要记录的软件 ——<br>
    每点一次鼠标自动截一张图。完成后回来点「停止录制」。
  </div>
  <div id="steps"></div>
</main>

<div class="toast" id="toast"></div>

<!-- AI 设置面板 -->
<div id="settingsModal" class="modal" style="display:none">
  <div class="modal-card">
    <h3>⚙️ AI 接入设置</h3>
    <label>接入方式</label>
    <select id="cfgProvider">
      <option value="ccswitch">CC Switch 跟随代理（默认，免配置）</option>
      <option value="glm">智谱 GLM 直连（填 API Key）</option>
      <option value="custom">自定义 API（OpenAI 兼容）</option>
    </select>

    <div id="cfgGlm" class="cfg-block">
      <label>智谱 API Key <small>（open.bigmodel.cn 获取，模型 glm-4v-plus）</small></label>
      <input id="cfgGlmKey" type="password" placeholder="填入 GLM API Key">
      <small class="hint">当前：<span id="cfgGlmMask">未设置</span></small>
    </div>

    <div id="cfgCustom" class="cfg-block">
      <label>API Base URL <small>（OpenAI 兼容）</small></label>
      <input id="cfgBaseUrl" placeholder="https://api.example.com/v1">
      <label>API Key</label>
      <input id="cfgCustomKey" type="password" placeholder="填入 Key">
      <small class="hint">当前：<span id="cfgCustomMask">未设置</span></small>
      <label>模型名</label>
      <input id="cfgModel" placeholder="gpt-4o / glm-4v-plus / qwen-vl-max …">
    </div>

    <div class="modal-actions">
      <button id="cfgSave">💾 保存</button>
      <button id="cfgClose" class="ghost">取消</button>
    </div>
    <p class="modal-note">说明：AI 会一次看完所有截图再为每步生成说明。Key 仅存在本机 config.json，不上传。</p>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let current = null;
let pollTimer = null;
let viewMode = "full";
const selection = new Set();   // 选中的步骤索引

function toast(msg){
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove("show"), 2200);
}
async function api(path, opts){
  const r = await fetch(path, opts);
  const j = await r.json().catch(()=>({error: r.statusText || ("HTTP "+r.status)}));
  if(!r.ok) throw new Error(j.error || ("HTTP "+r.status));
  return j;
}
function setStatus(html){ $("status") && ($("status").innerHTML = html); }
function showProgress(done, total){
  $("progress").classList.add("show");
  $("progFill").style.width = (total ? (done/total*100) : 0) + "%";
  $("progText").textContent = `AI 生成中 ${done}/${total}`;
}
function hideProgress(){ $("progress").classList.remove("show"); }

async function refreshState(){
  const s = await api("/api/state");
  $("warn").style.display = s.permission ? "none" : "block";
  if(!s.permission){
    $("warn").innerHTML = "⚠️ 未授予「辅助功能」权限，无法监听点击。请到 <b>系统设置 → 隐私与安全性 → 辅助功能</b>授权运行本程序的终端后重试。";
  }
  const sel = $("sessions"); sel.innerHTML = "";
  if(s.sessions.length === 0){
    const o = document.createElement("option"); o.textContent = "（暂无会话）"; sel.appendChild(o);
  } else {
    for(const sid of s.sessions){
      const o = document.createElement("option"); o.value = sid; o.textContent = sid; sel.appendChild(o);
    }
    if(current) sel.value = current.id;
  }
  return s;
}

async function loadSession(sid){
  try{
    current = await api("/api/session/"+sid);
    selection.clear();
    render();
  }catch(e){
    current = null; selection.clear(); render();
    toast("⚠️ 会话不存在或已删除，请重新录制");
    await refreshState();
  }
}

function render(){
  $("selAll").checked = false;
  if(!current){
    $("empty").style.display = "block";
    $("steps").innerHTML = "";
    $("title").value = ""; $("countBadge").textContent = "0 步";
    return;
  }
  $("empty").style.display = current.steps.length ? "none" : "block";
  $("title").value = current.title;
  $("countBadge").textContent = current.steps.length + " 步";
  const box = $("steps"); box.innerHTML = "";
  current.steps.forEach((st, i) => {
    const card = document.createElement("div");
    card.className = "step" + (selection.has(i) ? " sel" : "");
    card.innerHTML = `
      <div class="step-head">
        <input type="checkbox" class="selcb cb" ${selection.has(i)?'checked':''}>
        <div class="num">${i+1}</div>
        <input class="stitle" value="${escapeHtml(st.title||'')}" placeholder="第 ${i+1} 步标题…">
        <button class="icon-btn" data-act="up" ${i===0?'disabled':''}>↑</button>
        <button class="icon-btn" data-act="down" ${i===current.steps.length-1?'disabled':''}>↓</button>
        <button class="icon-btn" data-act="del">✕</button>
      </div>
      <img src="/api/image/${current.id}/${encodeURIComponent(st.screenshot)}?mode=${viewMode}" loading="lazy">
      <textarea rows="2" placeholder="这一步的说明…（点 ✨ AI 生成说明 自动填写）">${escapeHtml(st.description||'')}</textarea>`;
    const cb = card.querySelector(".cb");
    cb.onchange = ()=>{ if(cb.checked) selection.add(i); else selection.delete(i); render(); };
    const titleInp = card.querySelector(".stitle");
    const descTa = card.querySelector("textarea");
    titleInp.onchange = ()=>{ st.title = titleInp.value; save(); };
    descTa.onchange = ()=>{ st.description = descTa.value; save(); };
    card.querySelector('[data-act=up]').onclick = ()=>move(i,-1);
    card.querySelector('[data-act=down]').onclick = ()=>move(i,1);
    card.querySelector('[data-act=del]').onclick = ()=>del(i);
    card.querySelector("img").onclick = (e)=> e.target.requestFullscreen && e.target.requestFullscreen();
    box.appendChild(card);
  });
}

function escapeHtml(s){return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function save(){
  if(!current) return;
  await api("/api/session/"+current.id, {method:"POST", headers:{"Content-Type":"application/json"},
           body:JSON.stringify({title:current.title, steps:current.steps})});
}
function move(i,dir){
  const j=i+dir; if(j<0||j>=current.steps.length) return;
  [current.steps[i],current.steps[j]]=[current.steps[j],current.steps[i]];
  selection.clear(); render(); save();
}
function del(i){
  if(!confirm("删除第 "+(i+1)+" 步？")) return;
  current.steps.splice(i,1); selection.clear(); render(); save();
}

// ---------- 多选 / 批量删除 / 清空 ----------
$("selAll").onchange = ()=>{
  if(!current) return;
  if($("selAll").checked){ current.steps.forEach((_,i)=>selection.add(i)); }
  else { selection.clear(); }
  render();
};
$("btnDelSel").onclick = async ()=>{
  if(!current || !selection.size){ toast("先勾选要删除的步骤"); return; }
  if(!confirm(`删除选中的 ${selection.size} 步？`)) return;
  current.steps = current.steps.filter((_,i)=>!selection.has(i));
  selection.clear(); render(); save();
  toast("已删除选中步骤");
};
$("btnClearAI").onclick = async ()=>{
  if(!current || !current.steps.length){ toast("没有步骤"); return; }
  if(!confirm("清空所有步骤的 AI 说明？")) return;
  current.steps.forEach(s=>s.description="");
  render(); save(); toast("已清空 AI 说明");
};

// ---------- 录制 ----------
let recorder = {running:false};
$("btnRecord").onclick = async ()=>{
  if(recorder.running){
    setStatus && setStatus("正在归档…"); stopPoll();
    try{
      const r = await api("/api/stop",{method:"POST"});
      await refreshState(); await loadSession(r.sid);
      $("sessions").value = r.sid;
      toast(`已捕获 ${current.steps.length} 步`);
    }catch(e){ toast("❌ "+e.message); }
    syncRec();
  } else {
    try{ await api("/api/start",{method:"POST"}); }
    catch(e){ toast("❌ "+e.message); return; }
    toast("🔴 录制中：去操作目标软件，每点一次截一张图");
    startPoll();
    syncRec();
  }
};
function startPoll(){
  pollTimer = setInterval(async ()=>{
    const s = await api("/api/state");
    recorder.running = s.recording;
    updateRecBtn();
  }, 1200);
}
function stopPoll(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }
function updateRecBtn(){
  const b = $("btnRecord");
  if(recorder.running){ b.textContent="⏹ 停止录制"; b.classList.add("recording"); }
  else { b.textContent="⏺ 开始录制"; b.classList.remove("recording"); }
}
async function syncRec(){ const s = await api("/api/state"); recorder.running = s.recording; updateRecBtn(); }

// ---------- 会话切换 / 标题 ----------
$("sessions").onchange = (e)=>{ if(e.target.value) loadSession(e.target.value); };
$("title").onchange = async ()=>{ if(current){ current.title = $("title").value; await save(); } };

// ---------- AI（看全图，可停止）----------
let aiAbort = null;
async function runAI(){
  if(!current || !current.steps.length){ toast("没有步骤"); return; }
  const total = current.steps.length;
  aiAbort = new AbortController();
  $("btnAi").textContent = "⏹ 停止生成";
  showProgress(0, total);
  try{
    const resp = await fetch(`/api/ai/${current.id}`, {method:"POST", signal:aiAbort.signal});
    if(!resp.ok) throw new Error("HTTP "+resp.status);
    const reader = resp.body.getReader(); const dec = new TextDecoder(); let buf = "";
    while(true){
      const {done, value} = await reader.read(); if(done) break;
      buf += dec.decode(value, {stream:true});
      let idx;
      while((idx = buf.indexOf("\n\n")) >= 0){
        const frame = buf.slice(0, idx); buf = buf.slice(idx + 2);
        const m = frame.match(/data:\s*([\s\S]*)/);
        if(!m) continue;
        let ev; try{ ev = JSON.parse(m[1]); }catch(_){ continue; }
        if(ev.type === "done" && Array.isArray(ev.descriptions)){
          ev.descriptions.forEach((d,i)=>{ if(current.steps[i]) current.steps[i].description = d; });
        }
        if(ev.total){ showProgress(ev.done || 0, ev.total); }
        if(ev.type === "error"){ throw new Error(ev.error); }
      }
    }
    hideProgress(); render();
    toast("✅ AI 说明已生成");
  }catch(e){
    hideProgress();
    if(e.name === "AbortError"){ toast("已停止"); }
    else { toast("❌ "+e.message); }
  }
  $("btnAi").textContent = "✨ AI 生成说明";
  aiAbort = null;
}
$("btnAi").onclick = ()=>{
  if(aiAbort){ aiAbort.abort(); }   // 生成中→停止
  else { runAI(); }
};

// ---------- AI 设置面板 ----------
function toggleCfgBlocks(){
  const p = $("cfgProvider").value;
  $("cfgGlm").style.display = p === "glm" ? "block" : "none";
  $("cfgCustom").style.display = p === "custom" ? "block" : "none";
}
$("btnSettings").onclick = async ()=>{
  const c = await api("/api/config");
  $("cfgProvider").value = c.provider;
  $("cfgGlmMask").textContent = c.glm_key_set ? c.glm_key_mask : "未设置";
  $("cfgCustomMask").textContent = c.custom_key_set ? "已设置" : "未设置";
  $("cfgGlmKey").value = ""; $("cfgCustomKey").value = "";
  $("cfgBaseUrl").value = c.custom_base; $("cfgModel").value = c.custom_model;
  toggleCfgBlocks();
  $("settingsModal").style.display = "flex";
};
$("cfgProvider").onchange = toggleCfgBlocks;
$("cfgClose").onclick = ()=> $("settingsModal").style.display = "none";
$("cfgSave").onclick = async ()=>{
  const body = { provider: $("cfgProvider").value };
  if($("cfgGlmKey").value) body.glm_key = $("cfgGlmKey").value;
  body.custom_base = $("cfgBaseUrl").value.trim();
  if($("cfgCustomKey").value) body.custom_key = $("cfgCustomKey").value;
  body.custom_model = $("cfgModel").value.trim();
  try{ await api("/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); }
  catch(e){ toast("❌ "+e.message); return; }
  $("settingsModal").style.display = "none";
  toast("✅ 设置已保存");
};

// ---------- 视图切换 / 导出 ----------
$("btnView").onclick = ()=>{
  viewMode = viewMode === "full" ? "crop" : "full";
  $("btnView").textContent = viewMode === "full" ? "🎯 切聚焦" : "🔲 切全屏";
  render();
};
$("btnMd").onclick  = ()=>current && (location.href=`/api/export/${current.id}/md`);
$("btnHtml").onclick= ()=>current && (location.href=`/api/export/${current.id}/html`);
$("btnJson").onclick= ()=>current && (location.href=`/api/export/${current.id}/json`);
$("btnShutdown").onclick = async ()=>{
  if(!confirm("关闭步骤记录服务？关闭后需要重新双击 App 启动。")) return;
  try{ await api("/api/shutdown", {method:"POST"}); }catch(_){ }
  document.body.innerHTML = '<div style="font-family:-apple-system,PingFang SC,sans-serif;text-align:center;margin-top:20vh;color:#333"><h1>步骤记录已关闭</h1><p>需要再次使用时，双击桌面的「步骤记录.app」即可。</p></div>';
};
$("btnDel").onclick = async ()=>{
  if(!current){ toast("没有可删除的会话"); return; }
  if(!confirm("删除当前会话？不可撤销。")) return;
  await api("/api/session/"+current.id,{method:"DELETE"});
  current = null; selection.clear();
  await refreshState();
  const sids = $("sessions");
  if(sids.options.length && sids.options[0].value) loadSession(sids.options[0].value); else render();
  toast("已删除");
};

(async ()=>{
  const s = await refreshState();
  recorder.running = s.recording; updateRecBtn();
  if(s.sessions.length){ await loadSession(s.sessions[0]); } else { render(); }
})();
</script>
</body>
</html>
